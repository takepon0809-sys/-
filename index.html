<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嫌われ不安を整理するワークブック</title>
    <!-- ライブラリの読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (ブラウザ用) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // アイコンコンポーネントの簡易実装
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [step, setStep] = useState('intro');
            const [formData, setFormData] = useState({
                anxiety: '',
                whatHappened: '',
                isFactOrImagination: '',
                fact: '',
                interpretation: '',
                alternatives: ['', '', ''],
                worstCase: '',
                canHandle: '',
                selfMessage: ''
            });
            const [savedWork, setSavedWork] = useState([]);

            const handleInputChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
            };

            const handleAlternativeChange = (index, value) => {
                const newAlts = [...formData.alternatives];
                newAlts[index] = value;
                setFormData(prev => ({ ...prev, alternatives: newAlts }));
            };

            const saveToHistory = () => {
                const newEntry = {
                    ...formData,
                    id: Date.now(),
                    date: new Date().toLocaleString('ja-JP')
                };
                setSavedWork([newEntry, ...savedWork]);
                setStep('history');
            };

            const deleteEntry = (id) => {
                setSavedWork(savedWork.filter(entry => entry.id !== id));
            };

            const animationClass = "animate-in fade-in slide-in-from-bottom-2 duration-500";

            const renderIntro = () => (
                <div className={`space-y-6 ${animationClass}`}>
                    <div className="bg-pink-50 p-6 rounded-2xl border border-pink-100">
                        <h2 className="text-2xl font-bold text-pink-700 mb-4 flex items-center gap-2">
                            <Icon name="heart" className="text-pink-500 fill-pink-500" />
                            はじめに
                        </h2>
                        <p className="text-gray-700 leading-relaxed mb-4">
                            「今の言い方、大丈夫だったかな」「もしかして嫌われたかもしれない」<br />
                            そんなふうに、相手の反応を何度も思い返してしまうことはありませんか？
                        </p>
                        <p className="text-gray-700 leading-relaxed">
                            嫌われたくないという気持ちは、とても自然なものです。でも、その不安が強くなりすぎると自分自身を苦しめてしまいます。
                            このワークブックで、少しずつ心を軽くしていきましょう。
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                            <h3 className="font-bold text-gray-800 mb-2 flex items-center gap-2">
                                <Icon name="help-circle" className="text-blue-500" size={18} />
                                嫌われ不安の正体
                            </h3>
                            <ul className="text-sm text-gray-600 space-y-2">
                                <li>・相手の表情を過剰に気にする</li>
                                <li>・会話のあとに一人反省会をする</li>
                                <li>・本音が言えず、合わせすぎて疲れる</li>
                                <li className="font-bold text-pink-600">👉 実は「想像」であることがほとんどです</li>
                            </ul>
                        </div>
                        <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                            <h3 className="font-bold text-gray-800 mb-2 flex items-center gap-2">
                                <Icon name="edit-3" className="text-green-500" size={18} />
                                ワークの進め方
                            </h3>
                            <p className="text-sm text-gray-600">
                                今のモヤモヤを書き出すことで、頭の中の霧を晴らしていきます。
                                完璧を目指さず、今の気持ちを素直に言葉にしてみましょう。
                            </p>
                        </div>
                    </div>

                    <button 
                        onClick={() => setStep('work1')}
                        className="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 group"
                    >
                        ワークを始める
                        <Icon name="arrow-right" size={18} className="group-hover:translate-x-1 transition-transform" />
                    </button>
                </div>
            );

            const renderWork1 = () => (
                <div className={`space-y-6 ${animationClass}`}>
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-bold text-gray-800">Step 1: 不安の言語化</h2>
                        <span className="text-sm font-medium text-pink-500">1 / 5</span>
                    </div>
                    
                    <div className="space-y-4">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">今、不安に思っていることは？</label>
                            <textarea 
                                className="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-200 outline-none h-24"
                                placeholder="例：さっきのLINEの返信がそっけなかった気がする..."
                                value={formData.anxiety}
                                onChange={(e) => handleInputChange('anxiety', e.target.value)}
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">何が起きたと思っている？（あなたの主観）</label>
                            <textarea 
                                className="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-200 outline-none h-24"
                                placeholder="例：私が余計なことを言ったから、怒らせてしまったんだと思う"
                                value={formData.whatHappened}
                                onChange={(e) => handleInputChange('whatHappened', e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="flex gap-3">
                        <button onClick={() => setStep('intro')} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">戻る</button>
                        <button onClick={() => setStep('work2')} className="flex-1 py-3 bg-pink-500 text-white rounded-xl font-bold">次へ</button>
                    </div>
                </div>
            );

            const renderWork2 = () => (
                <div className={`space-y-6 ${animationClass}`}>
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-bold text-gray-800">Step 2: 事実と解釈を分ける</h2>
                        <span className="text-sm font-medium text-pink-500">2 / 5</span>
                    </div>

                    <div className="bg-blue-50 p-4 rounded-xl text-sm text-blue-700 mb-4">
                        「事実」はカメラに映る客観的な出来事。「解釈」はあなたが後から付け足した意味です。
                    </div>
                    
                    <div className="space-y-4">
                        <div className="bg-white border-l-4 border-green-500 p-4 shadow-sm">
                            <label className="block text-sm font-bold text-gray-700 mb-2">事実（実際に起きたこと）</label>
                            <input 
                                className="w-full p-2 border-b border-gray-200 focus:border-green-500 outline-none"
                                placeholder="例：返信がスタンプ1個だった"
                                value={formData.fact}
                                onChange={(e) => handleInputChange('fact', e.target.value)}
                            />
                        </div>
                        <div className="bg-white border-l-4 border-red-500 p-4 shadow-sm">
                            <label className="block text-sm font-bold text-gray-700 mb-2">解釈（あなたが思ったこと）</label>
                            <input 
                                className="w-full p-2 border-b border-gray-200 focus:border-red-500 outline-none"
                                placeholder="例：嫌われたかもしれない、興味を持たれていない"
                                value={formData.interpretation}
                                onChange={(e) => handleInputChange('interpretation', e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="flex gap-3">
                        <button onClick={() => setStep('work1')} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">戻る</button>
                        <button onClick={() => setStep('work3')} className="flex-1 py-3 bg-pink-500 text-white rounded-xl font-bold">次へ</button>
                    </div>
                </div>
            );

            const renderWork3 = () => (
                <div className={`space-y-6 ${animationClass}`}>
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-bold text-gray-800">Step 3: 別の可能性を考える</h2>
                        <span className="text-sm font-medium text-pink-500">3 / 5</span>
                    </div>

                    <p className="text-sm text-gray-600 italic">「嫌われた」以外に、相手に何が起きていた可能性がありますか？（3つひねり出してみましょう）</p>
                    
                    <div className="space-y-3">
                        {formData.alternatives.map((alt, idx) => (
                            <div key={idx} className="flex items-center gap-3">
                                <span className="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-sm font-bold text-gray-500">{idx + 1}</span>
                                <input 
                                    className="flex-1 p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-200 outline-none"
                                    placeholder={idx === 0 ? "例：ただ忙しかっただけかも" : idx === 1 ? "例：体調が悪かったのかもしれない" : "例：もともとそういう返信のタイプかも"}
                                    value={alt}
                                    onChange={(e) => handleAlternativeChange(idx, e.target.value)}
                                />
                            </div>
                        ))}
                    </div>

                    <div className="flex gap-3">
                        <button onClick={() => setStep('work2')} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">戻る</button>
                        <button onClick={() => setStep('work4')} className="flex-1 py-3 bg-pink-500 text-white rounded-xl font-bold">次へ</button>
                    </div>
                </div>
            );

            const renderWork4 = () => (
                <div className={`space-y-6 ${animationClass}`}>
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-bold text-gray-800">Step 4: 最悪のケースを想定する</h2>
                        <span className="text-sm font-medium text-pink-500">4 / 5</span>
                    </div>

                    <div className="space-y-4">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">もし本当に嫌われたとしたら、何が起きますか？</label>
                            <textarea 
                                className="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-200 outline-none h-24"
                                placeholder="例：その人と少し疎遠になる。気まずい時間が流れる。"
                                value={formData.worstCase}
                                onChange={(e) => handleInputChange('worstCase', e.target.value)}
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">それはあなたの人生を一生台無しにしますか？対処は可能ですか？</label>
                            <textarea 
                                className="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-200 outline-none h-24"
                                placeholder="例：悲しいけれど、他の友達もいるし、時間が解決するはず。"
                                value={formData.canHandle}
                                onChange={(e) => handleInputChange('canHandle', e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="flex gap-3">
                        <button onClick={() => setStep('work3')} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">戻る</button>
                        <button onClick={() => setStep('work5')} className="flex-1 py-3 bg-pink-500 text-white rounded-xl font-bold">次へ</button>
                    </div>
                </div>
            );

            const renderWork5 = () => (
                <div className={`space-y-6 ${animationClass}`}>
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-bold text-gray-800">Step 5: 自分への声かけ</h2>
                        <span className="text-sm font-medium text-pink-500">5 / 5</span>
                    </div>

                    <div className="flex flex-col items-center py-4">
                        <Icon name="smile" size={60} className="text-pink-400 mb-4" />
                        <p className="text-center text-gray-600 mb-6 px-4">
                            不安と向き合った自分を褒めてあげましょう。<br />
                            今の自分にかけたい、優しい言葉を書いてください。
                        </p>
                        
                        <input 
                            className="w-full p-6 text-center text-xl font-medium text-pink-700 border-2 border-dashed border-pink-200 rounded-2xl focus:border-pink-500 outline-none bg-pink-50"
                            placeholder="例：よく頑張ったね、大丈夫だよ"
                            value={formData.selfMessage}
                            onChange={(e) => handleInputChange('selfMessage', e.target.value)}
                        />
                    </div>

                    <div className="flex gap-3">
                        <button onClick={() => setStep('work4')} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">戻る</button>
                        <button onClick={saveToHistory} className="flex-1 py-3 bg-pink-500 text-white rounded-xl font-bold flex items-center justify-center gap-2">
                            <Icon name="save" size={18} />
                            ワークを保存する
                        </button>
                    </div>
                </div>
            );

            const renderHistory = () => (
                <div className={`space-y-6 ${animationClass}`}>
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-bold text-gray-800">保存されたワーク</h2>
                        <button onClick={() => setStep('intro')} className="text-sm text-pink-500 font-bold hover:underline">新しいワークを始める</button>
                    </div>

                    {savedWork.length === 0 ? (
                        <div className="text-center py-12 text-gray-400 italic">
                            まだ記録はありません
                        </div>
                    ) : (
                        <div className="space-y-4">
                            {savedWork.map((entry) => (
                                <div key={entry.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative group">
                                    <button 
                                        onClick={() => deleteEntry(entry.id)}
                                        className="absolute top-4 right-4 text-gray-300 hover:text-red-500 transition-colors"
                                    >
                                        <Icon name="trash-2" size={18} />
                                    </button>
                                    <div className="text-xs text-gray-400 mb-2">{entry.date}</div>
                                    <h4 className="font-bold text-gray-800 mb-2">不安: {entry.anxiety}</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
                                        <div className="bg-green-50 p-3 rounded-lg text-sm">
                                            <span className="font-bold text-green-700 block mb-1">事実:</span>
                                            {entry.fact}
                                        </div>
                                        <div className="bg-red-50 p-3 rounded-lg text-sm">
                                            <span className="font-bold text-red-700 block mb-1">解釈:</span>
                                            {entry.interpretation}
                                        </div>
                                    </div>
                                    <div className="mt-4 p-3 bg-pink-50 rounded-lg border border-pink-100 italic text-pink-700 text-center">
                                        「{entry.selfMessage}」
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <button onClick={() => setStep('intro')} className="w-full py-4 bg-gray-100 text-gray-600 rounded-xl font-bold mt-4">戻る</button>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#fdf8f8] p-4 md:p-8 flex justify-center font-sans">
                    <div className="w-full max-w-2xl bg-white shadow-2xl shadow-pink-100/50 rounded-[2rem] overflow-hidden flex flex-col border border-pink-50">
                        <header className="bg-white border-b border-gray-100 p-6 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-pink-500 rounded-full flex items-center justify-center text-white">
                                    <Icon name="message-circle" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-gray-800">Mind Care Workbook</h1>
                                    <p className="text-xs text-gray-400">嫌われ不安を整理する</p>
                                </div>
                            </div>
                            <button 
                                onClick={() => setStep('history')}
                                className={`p-2 rounded-full transition-colors ${step === 'history' ? 'bg-pink-100 text-pink-600' : 'text-gray-400 hover:bg-gray-100'}`}
                            >
                                <Icon name="refresh-ccw" size={20} />
                            </button>
                        </header>

                        <main className="flex-1 p-6 md:p-10 overflow-y-auto">
                            {step === 'intro' && renderIntro()}
                            {step === 'work1' && renderWork1()}
                            {step === 'work2' && renderWork2()}
                            {step === 'work3' && renderWork3()}
                            {step === 'work4' && renderWork4()}
                            {step === 'work5' && renderWork5()}
                            {step === 'history' && renderHistory()}
                        </main>

                        <footer className="p-4 bg-gray-50 border-t border-gray-100 text-center">
                            <p className="text-xs text-gray-400 italic">
                                「嫌われ不安は、なくすものではなく、扱い方を覚えるもの」
                            </p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
